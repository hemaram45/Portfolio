<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Graphs</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a);
            color: white;
        }

        h2 {
            text-align: center;
            margin: 30px 0;
            font-size: 28px;
            letter-spacing: 1px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        /* CARD */
        .card {
            background: rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0,255,255,0.25);
        }

        .card h3 {
            margin-bottom: 15px;
            font-weight: 500;
            color: #38bdf8;
        }

        canvas {
            max-width: 100%;
        }

        /* subtle divider */
        .card::after {
            content: "";
            display: block;
            height: 2px;
            margin-top: 10px;
            background: linear-gradient(to right, transparent, cyan, transparent);
            opacity: 0.3;
        }
    </style>
</head>

<body>

<h2>📊 Analytics Dashboard</h2>

<div class="grid">

    <!-- BAR -->
    <div class="card">
        <h3>Bar Chart</h3>
        <canvas id="barChart"></canvas>
    </div>

    <!-- LINE -->
    <div class="card">
        <h3>Line Chart</h3>
        <canvas id="lineChart"></canvas>
    </div>

    <!-- PIE -->
    <div class="card">
        <h3>Pie Chart</h3>
        <canvas id="pieChart"></canvas>
    </div>

</div>

<script>
    let names = {{ names | tojson | safe }};
    let counts = {{ counts | tojson | safe }};

    // BAR
    new Chart(document.getElementById("barChart"), {
        type: 'bar',
        data: {
            labels: names,
            datasets: [{
                label: 'Messages',
                data: counts,
                backgroundColor: '#38bdf8'
            }]
        },
        options: {
            plugins: { legend: { labels: { color: 'white' } } },
            scales: {
                x: { ticks: { color: 'white' } },
                y: { ticks: { color: 'white' }, beginAtZero: true }
            }
        }
    });

    // LINE
    new Chart(document.getElementById("lineChart"), {
        type: 'line',
        data: {
            labels: names,
            datasets: [{
                label: 'Messages',
                data: counts,
                borderColor: '#22d3ee',
                backgroundColor: 'rgba(34,211,238,0.2)',
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            plugins: { legend: { labels: { color: 'white' } } },
            scales: {
                x: { ticks: { color: 'white' } },
                y: { ticks: { color: 'white' }, beginAtZero: true }
            }
        }
    });

    // PIE
    new Chart(document.getElementById("pieChart"), {
        type: 'pie',
        data: {
            labels: names,
            datasets: [{
                data: counts,
                backgroundColor: [
                    '#38bdf8', '#0ea5e9', '#22d3ee', '#67e8f9', '#0284c7'
                ]
            }]
        },
        options: {
            plugins: {
                legend: {
                    labels: { color: 'white' }
                }
            }
        }
    });

</script>

</body>
</html>
